<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <title>Wiki VIP — Infraestrutura</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css">
  <style>
    .sidebar .app-name-link img {
      max-height: 160px;
      max-width: 160px;
      width: auto;
      height: auto;
      object-fit: contain;
    }
    .sidebar .app-name {
      font-size: 1rem;
    }
    .alert-public {
      background: #ffebee;
      border: 1px solid #ef5350;
      border-left: 4px solid #d32f2f;
      border-radius: 4px;
      color: #b71c1c;
      padding: 0.85rem 1rem;
      margin: 1rem 0;
    }
    .alert-public strong {
      color: #c62828;
    }
    .alert-public p:last-child,
    .alert-public ul:last-child {
      margin-bottom: 0;
    }

    .theme-toggle {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 999;
      width: 2.75rem;
      height: 2.75rem;
      border: none;
      border-radius: 50%;
      background: var(--theme-color, #42b983);
      color: #fff;
      font-size: 1.25rem;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
      transition: transform 0.2s, background 0.2s;
    }
    .theme-toggle:hover {
      transform: scale(1.08);
    }
    body.dark-mode .theme-toggle {
      background: #34495e;
    }

    body.dark-mode {
      --theme-color: #42b983;
      --text-color: #e0e0e0;
      --border-color: #444;
    }
    body.dark-mode,
    body.dark-mode .markdown-section {
      background-color: #1e1e1e;
      color: #e0e0e0;
    }
    body.dark-mode .sidebar {
      background-color: #252526;
    }
    body.dark-mode .sidebar-nav li a {
      color: #ccc;
    }
    body.dark-mode .sidebar-nav li.active > a,
    body.dark-mode .sidebar-nav li a:hover {
      color: var(--theme-color);
    }
    body.dark-mode .sidebar-toggle {
      background-color: rgba(0, 0, 0, 0.3);
    }
    body.dark-mode .search input {
      background-color: #2d2d2d;
      border-color: #444;
      color: #e0e0e0;
    }
    body.dark-mode .markdown-section h1,
    body.dark-mode .markdown-section h2,
    body.dark-mode .markdown-section h3,
    body.dark-mode .markdown-section h4,
    body.dark-mode .markdown-section h5,
    body.dark-mode .markdown-section h6 {
      color: #e0e0e0;
    }
    body.dark-mode .markdown-section code {
      background-color: #2d2d2d;
      color: #e06c75;
    }
    body.dark-mode .markdown-section pre {
      background-color: #2d2d2d;
    }
    body.dark-mode .markdown-section pre > code {
      color: #abb2bf;
    }
    body.dark-mode .markdown-section table {
      border-color: #444;
    }
    body.dark-mode .markdown-section tr:nth-child(2n) {
      background-color: #2a2a2a;
    }
    body.dark-mode .markdown-section th,
    body.dark-mode .markdown-section td {
      border-color: #444;
    }
    body.dark-mode .markdown-section blockquote {
      border-left-color: var(--theme-color);
      color: #aaa;
    }
    body.dark-mode .markdown-section hr {
      border-color: #444;
    }
    body.dark-mode .markdown-section a {
      color: var(--theme-color);
    }
    body.dark-mode .app-nav li a {
      color: #ccc;
    }
    body.dark-mode .pagination-item-title {
      color: #ccc;
    }
    body.dark-mode .docsify-tabs__tab {
      background: #2d2d2d;
      color: #ccc;
      border-color: #444;
    }
    body.dark-mode .docsify-tabs__tab--active {
      background: #1e1e1e;
      color: var(--theme-color);
    }
    body.dark-mode .docsify-tabs__content {
      border-color: #444;
    }
    body.dark-mode .alert-public {
      background: #3d2020;
      border-color: #ef5350;
      border-left-color: #ef5350;
      color: #ffcdd2;
    }
    body.dark-mode .alert-public strong {
      color: #ff8a80;
    }
  </style>
</head>
<body>
  <script>
    (function () {
      if (localStorage.getItem('wiki-vip-theme') === 'dark') {
        document.body.classList.add('dark-mode');
      }
    })();
  </script>
  <div id="app"></div>
  <script>
    var THEME_STORAGE_KEY = 'wiki-vip-theme';

    function isDarkMode() {
      return document.body.classList.contains('dark-mode');
    }

    function initMermaid(theme) {
      if (typeof mermaid === 'undefined') return;
      mermaid.initialize({
        startOnLoad: false,
        theme: theme === 'dark' ? 'dark' : 'default'
      });
    }

    function rerenderMermaid() {
      if (typeof mermaid === 'undefined') return;
      document.querySelectorAll('.mermaid').forEach(function (el) {
        var source = el.getAttribute('data-original') || el.textContent.trim();
        el.setAttribute('data-original', source);
        el.removeAttribute('data-processed');
        el.innerHTML = source;
      });
      if (document.querySelectorAll('.mermaid').length) {
        mermaid.run({ nodes: document.querySelectorAll('.mermaid') });
      }
    }

    function setTheme(theme) {
      if (theme === 'dark') {
        document.body.classList.add('dark-mode');
      } else {
        document.body.classList.remove('dark-mode');
      }
      localStorage.setItem(THEME_STORAGE_KEY, theme);
      initMermaid(theme);
      rerenderMermaid();
      var btn = document.querySelector('.theme-toggle');
      if (btn) btn.textContent = theme === 'dark' ? '\u2600' : '\u263E';
    }

    function toggleTheme() {
      setTheme(isDarkMode() ? 'light' : 'dark');
    }

    window.$docsify = {
      name: 'Wiki VIP',
      logo: '/assets/img/logo.png',
      repo: '',
      homepage: 'docs/README.md',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 3,
      relativePath: false,
      auto2top: true,
      alias: {
        '/CONTRIBUTING.md': '/docs/CONTRIBUTING.md',
        '/': '/docs/README.md',
        '/README.md': '/docs/README.md',
        '/_sidebar.md': '/docs/_sidebar.md',
        '/_navbar.md': '/docs/_navbar.md',
        '/.*/_sidebar.md': '/docs/_sidebar.md',
        '/.*/_navbar.md': '/docs/_navbar.md'
      },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Buscar...',
        noData: 'Nenhum resultado',
        depth: 6
      },
      pagination: {
        previousText: 'Anterior',
        nextText: 'Próximo',
        crossChapter: true,
        crossChapterText: true
      },
      copyCode: {
        buttonText: 'Copiar',
        errorText: 'Erro',
        successText: 'Copiado!'
      },
      tabs: {
        persist: true,
        sync: true
      },
      plugins: [
        function (hook) {
          hook.mounted(function () {
            if (document.querySelector('.theme-toggle')) return;
            var btn = document.createElement('button');
            btn.className = 'theme-toggle';
            btn.type = 'button';
            btn.setAttribute('aria-label', 'Alternar tema claro/escuro');
            btn.textContent = isDarkMode() ? '\u2600' : '\u263E';
            btn.addEventListener('click', toggleTheme);
            document.body.appendChild(btn);
          });
          hook.doneEach(function () {
            rerenderMermaid();
          });
        }
      ]
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-tabs@1/dist/docsify-tabs.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-mermaid@2/dist/docsify-mermaid.js"></script>
  <script>
    initMermaid(isDarkMode() ? 'dark' : 'light');
  </script>
</body>
</html>

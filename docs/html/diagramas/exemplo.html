<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Diagrama de exemplo</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      margin: 0;
      background: #f5f5f5;
    }
    .box {
      padding: 2rem;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    .arrow { color: #42b983; font-size: 1.5rem; margin: 0 1rem; }
  </style>
</head>
<body>
  <div class="box">Node-RED</div>
  <span class="arrow">→</span>
  <div class="box">API Backend</div>
  <span class="arrow">→</span>
  <div class="box">Database</div>
</body>
</html>
